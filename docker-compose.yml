services:
  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./library
      dockerfile: Dockerfile.migrate
    environment:
      - ENV=Development
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./library
      dockerfile: library.api/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ENV=Development
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  ui:
    build: ./library-ui
    ports:
      - "4000:4000"
    environment:
      - ENV=Development
    depends_on:
      - api

volumes:
  db-data: