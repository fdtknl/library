services:
  ui:
    build: ./library-ui
    ports:
      - "4000:4000"
    environment:
      - ENV=Development
    depends_on:
      - api

  api:
    build:
      context: ./library
      dockerfile: library.api/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ENV=Development
    depends_on:
      - db

  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: